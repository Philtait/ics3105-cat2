<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Save Our Wildlife</h1>

      <div class="video-wrapper">
        <video
          id="wildlifeVideo"
          controls
          aria-label="Wildlife conservation promotional video"
        >
          <source src="wildlife.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <p class="description">
        Every species lost is a thread pulled from the web of life. Join us in
        protecting the animals, habitats, and ecosystems that make our planet
        extraordinary. Together, we can make a difference before it is too late.
      </p>

      <button id="toggleBtn" aria-controls="wildlifeVideo">
        Hide Video
      </button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
